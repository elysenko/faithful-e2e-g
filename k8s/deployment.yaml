apiVersion: apps/v1
kind: Deployment
metadata:
  name: faithful-e2e-g
  namespace: colossus-faithful-e2e-g
  labels:
    app: faithful-e2e-g
    managed-by: colossus
spec:
  replicas: 1
  # Recreate (NOT the default RollingUpdate): the per-project namespace has a hard
  # memory ResourceQuota. A RollingUpdate creates the new pod before terminating the
  # old one, transiently needing 2x the pod's memory — which the quota denies, so the
  # rollout stalls with ProgressDeadlineExceeded. Kill-before-create is correct for a
  # single-replica staging app (a few seconds of downtime is acceptable).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: faithful-e2e-g
  template:
    metadata:
      labels:
        app: faithful-e2e-g
    spec:
      hostAliases:
        - ip: "192.168.50.250"
          hostnames:
            - "ubuntu.desmana-truck.ts.net"
      containers:
        - name: app
          image: ubuntu:30500/faithful-e2e-g:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: app-secrets
                optional: true
