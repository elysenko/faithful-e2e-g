# colossus.yaml — generated by scaffolder, read by deploy agents.
# Do not delete. The deploy agents use this instead of framework auto-detection.
# {{IMAGE_NAME}} is a placeholder substituted by the deploy agent at build time.
#
# Single-container packaging: the root Dockerfile builds the Angular SPA and the
# NestJS API into ONE image. NestJS serves the REST API under /api and the compiled
# Angular bundle (with SPA deep-link fallback) on port 80. This matches k8s/deployment.yaml
# (one container, targetPort 80) and the /faithful-e2e-g/* ingress, which strips the
# prefix before the request reaches the pod.
framework: dockerfile
projectName: faithful-e2e-g
dockerfile: Dockerfile
buildDir: .
port: 80
baseHref: "/{{IMAGE_NAME}}/"
